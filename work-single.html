	<script>
		var project_info = [
			{
				title: 'Giovvani',

			{
				title: 'Gabettishortrent',

				url: 'https://gabettishortrent.com',
				description: 'One of my proudest projects is a real-estate web application using Laravel, Nuxt3, MySQL, and Redis.<br><br>With these technologies, we built a highly flexible and customizable real-estate platform that can handle large amounts of data and traffic while providing a smooth and seamless user experience.<br><br>Whether you`re a real estate agent, property developer, or home buyer, this platform is designed to meet your needs and provide you with a comprehensive and efficient solution for managing real estate information and transactions.'
			},
			{
				title: 'Healthrhythms',
				info: 'MERN Stack',
				url: 'https://www.healthrhythms.com',
				description: 'This app is a healthcare app that lets doctors and patients can schedule meetings, as well as doctors can take care of the patients with detailed information such as temperature, heart rate, etc.<br><br>It also has a chat system that allows doctors and patients could have a conversation via text/voice/video chat via DM or Group Chat.<br><br>It is developed by React.js for the front end and Node.js for its back end. We used React Native for Android/iOS platforms.<br><br>This project is written by Typescript and used Redux and Redux Saga for its state management and built components using React Hooks.<br><br>We implemented a chat system using Socket.io and used Apollo GraphQL to build Backend APIs We used AWS EC2 and S3 to build its infrastructure.'
			},
			{

				info: 'Gatsby, GraphQL',

			{

				url: 'https://www.larkhotels.com',
				description: 'Lark Hotels is a hotel management and development company, which owns and develops hotels, mostly in New England. The website provides users with information about Lark Hotels and their properties, including descriptions of the hotels, photos, and amenities.<br><br>Users can also use the website to search for available rooms and make reservations at any of the Lark Hotels properties. The website offers a simple and intuitive booking process, where users can select their desired travel dates and browse through available room options. Additionally, users can also access special offers and packages, as well as information about events and activities in the surrounding areas.<br><br>We used Angular 9.0.1 for front-end and Wordpress CMS. And we implemented reCAPTCHA for authentication.<br><br>The website also features a blog with articles and tips related to travel, food, and lifestyle, as well as information about the company`s philosophy and values. Users can also learn more about the company`s history, management team, and career opportunities. Overall, the website serves as an informational hub for Lark Hotels and offers a convenient way for users to explore and book stays at their various properties.'
			},
			{
				title: 'Gulalae',
				info: 'Shopify',
				url: 'https://www.gulalae.com',
				description: 'Gulalae.com is online store that specializes in selling women`s clothing, specifically modest and Islamic fashion. Their product offerings include dresses, abayas, hijabs, skirts, and other clothing items. The site is based in the United Arab Emirates and ships worldwide.<br><br>With the Shopify App Store, we enhanced the website`s functionality and streamline business operations by installing a wide range of third-party apps.This Shopify store is designed for performance, with fast page load times and reliable uptime.<br><br>Overall, as a luxury shoe retailer, this Shopify website provides a comprehensive and sophisticated e- commerce solution, with SEO optimization, secure payment options, a range of apps, and fast performance, etc.'
			},
			{
				title: 'Saberzone',
				info: 'Shopify',
				url: 'https://www.saberzone.com',
				description: 'Saberzone.com is an online store that specializes in selling custom-made lightsabers and other related products. Their lightsabers are designed for use in cosplay, martial arts, and stage performances. Saberzone offers a variety of lightsabers, including single-bladed, double-bladed, and sound-equipped lightsabers.<br><br>Saberzone allows customers to customize their lightsabers with different blade colors, hilt designs, and sound options. They also offer a range of accessories and replacement parts, including blades, chargers, and sound modules. The site is based in the United Kingdom, but they offer international shipping.<br><br>With the Shopify App Store, we enhanced the website`s functionality and streamline business operations by installing a wide range of third-party apps.<br><br>This Shopify store is designed for performance, with fast page load times and reliable uptime.<br><br>Overall, as a luxury shoe retailer, this Shopify website provides a comprehensive and sophisticated e- commerce solution, with SEO optimization, secure payment options, a range of apps, and fast performance, etc.'
			}
		]

		const urlString = window.location.href;

		// create a URL object from the URL string
		const url = new URL(urlString);

		// get the URLSearchParams object from the URL object
		const searchParams = url.searchParams;

		// get the value of the "id" parameter
		const id = searchParams.get("id");

		const portfolioTitle = document.getElementById('project_title');
		portfolioTitle.innerHTML = project_info[id - 1].title;

		const portfolioImg = document.getElementById('portfolio-img');
		portfolioImg.setAttribute("src", "images/portfolio/" + id + ".jpg");

		const portfolioURL = document.getElementById('project_url');
		portfolioURL.innerHTML = project_info[id - 1].url;
		portfolioURL.setAttribute("href", project_info[id - 1].url);

		const portfolioINFO = document.getElementById('project_info');
		portfolioINFO.innerHTML = project_info[id - 1].info;

		const portfolioDESC = document.getElementById('project_description');
		portfolioDESC.innerHTML = project_info[id - 1].description;
	</script>
